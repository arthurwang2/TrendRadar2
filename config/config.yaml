app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false

platforms:
  enabled: true
  sources:
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "cankaoxiaoxi"
      name: "参考消息"
    - id: "zaobao"
      name: "联合早报"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "cls-telegraph"
      name: "财联社电报"
    - id: "xueqiu"
      name: "雪球"
    - id: "ithome"
      name: "IT之家"
    - id: "36kr"
      name: "36氪"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2

  feeds:
    # 央媒高质量源 (你的私有节点测试能通，继续保留)
    - id: "cctv-xwlb"
      name: "央视新闻-新闻联播"
      url: "https://taiwei-rsshub.vercel.app/cctv/xwlb"
      max_age_days: 2

    - id: "thepaper-tt"
      name: "澎湃新闻-头条"
      url: "https://taiwei-rsshub.vercel.app/thepaper/featured"
      max_age_days: 2
    
    # 政务与政策动态 (替换为微软 Bing 官方 RSS，免疫封杀)
    - id: "xinhua-yw"
      name: "新华网-要闻"
      url: "https://cn.bing.com/news/search?q=新华网+要闻&mkt=zh-CN&format=rss"
      max_age_days: 2

    - id: "sh-sheitc"
      name: "上海市经信委-最新动态"
      url: "https://cn.bing.com/news/search?q=上海市经信委+最新动态&mkt=zh-CN&format=rss"
      max_age_days: 2

    - id: "sh-sww"
      name: "上海市商务委-新闻动态"
      url: "https://cn.bing.com/news/search?q=上海市商务委+新闻&mkt=zh-CN&format=rss"
      max_age_days: 2

    - id: "sh-fgw-energy"
      name: "上海市发改委-新能源政策"
      url: "https://cn.bing.com/news/search?q=上海市发改委+新能源+政策&mkt=zh-CN&format=rss"
      max_age_days: 2
      
    - id: "miit-gov"
      name: "工信部-新能源公告"
      url: "https://cn.bing.com/news/search?q=工信部+新能源汽车&mkt=zh-CN&format=rss" 
      max_age_days: 2

    # 新能源车企官方及全网核心动态 (替换为 Bing 官方 RSS，秒级更新)
    - id: "xiaomi-auto"
      name: "小米汽车(全网动态)"
      url: "https://cn.bing.com/news/search?q=小米汽车+官方&mkt=zh-CN&format=rss"
      max_age_days: 2

    - id: "byd-auto"
      name: "比亚迪(全网动态)"
      url: "https://cn.bing.com/news/search?q=比亚迪汽车+官方&mkt=zh-CN&format=rss"
      max_age_days: 2

    - id: "nio"
      name: "蔚来(全网动态)"
      url: "https://cn.bing.com/news/search?q=蔚来汽车+官方&mkt=zh-CN&format=rss"
      max_age_days: 2

    - id: "lixiang-auto"
      name: "理想汽车(全网动态)"
      url: "https://cn.bing.com/news/search?q=理想汽车+官方&mkt=zh-CN&format=rss"
      max_age_days: 2

    - id: "xiaopeng-auto"
      name: "小鹏汽车(全网动态)"
      url: "https://cn.bing.com/news/search?q=小鹏汽车+何小鹏&mkt=zh-CN&format=rss" 
      max_age_days: 2

    - id: "zeekr"
      name: "极氪(全网动态)"
      url: "https://cn.bing.com/news/search?q=极氪汽车+官方&mkt=zh-CN&format=rss"
      max_age_days: 2

    - id: "aito"
      name: "问界AITO(全网动态)"
      url: "https://cn.bing.com/news/search?q=问界+AITO汽车&mkt=zh-CN&format=rss"
      max_age_days: 2

    - id: "leapmotor"
      name: "零跑汽车(全网动态)"
      url: "https://cn.bing.com/news/search?q=零跑汽车+官方&mkt=zh-CN&format=rss"
      max_age_days: 2

report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 10

filter:
  method: "keyword"
  priority_sort_enabled: true

display:
  region_order:
    - hotlist
    - rss
  regions:
    new_items: false
    hotlist: true
    rss: true
    standalone: false
    ai_analysis: false

notification:
  enabled: true
  channels:
    bark:
      url: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
    json: true
  local:
    data_dir: "output"
    retention_days: 0

ai:
  model: "openai/Qwen/Qwen2.5-7B-Instruct"
  api_key: ""
  api_base: "https://api.siliconflow.cn/v1"
  timeout: 120
  temperature: 1.0
  max_tokens: 5000

ai_analysis:
  enabled: false

ai_translation:
  enabled: false

advanced:
  debug: false
  rss:
    request_interval: 15000
    timeout: 60
    use_proxy: false

# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.2.0
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false

platforms:
  enabled: true
  sources:
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "cankaoxiaoxi"
      name: "参考消息"
    - id: "zaobao"
      name: "联合早报"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "cls-telegraph"
      name: "财联社电报"
    - id: "xueqiu"
      name: "雪球"
    - id: "ithome"
      name: "IT之家"
    - id: "36kr"
      name: "36氪"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1

  feeds:
    # 央媒及主流媒体高质量源
    - id: "cctv-xwlb"
      name: "央视新闻-新闻联播"
      url: "https://rsshub.app/cctv/xwlb"
      max_age_days: 1

    - id: "xinhua-yw"
      name: "新华网-要闻"
      url: "https://rsshub.app/xinhua/news"
      max_age_days: 1

    - id: "thepaper-tt"
      name: "澎湃新闻-头条"
      url: "https://rsshub.app/thepaper/featured"
      max_age_days: 2
    
    # 上海新能源与商务政策专属监控源
    - id: "sh-sheitc"
      name: "上海市经信委-最新动态"
      url: "https://rsshub.app/gov/shanghai/sheitc/xwdt"
      max_age_days: 2

    - id: "sh-sww"
      name: "上海市商务委-新闻动态"
      url: "https://rsshub.app/gov/shanghai/sww/xwdt"
      max_age_days: 2

    - id: "sh-fgw-energy"
      name: "上海市发改委(新能源办)-政策文件"
      url: "https://rsshub.app/gov/shanghai/fgw/zcwj"
      max_age_days: 2
      
    # 汽车行业垂直源及宏观政策源
    - id: "cnautonews"
      name: "中国汽车报"
      url: "https://www.cnautonews.com/rss.xml" # 注意：该网站SSL证书有问题，需配合修改代码中 requests 的 verify=False
      max_age_days: 2

    - id: "evtimes"
      name: "电动汽车时代"
      url: "https://www.evtimes.cn/feed"
      max_age_days: 2

    - id: "miit-gov"
      name: "工信部官网"
      url: "https://rsshub.app/gov/miit/wjfb" # 已修复404，替换为 RSSHub 抓取工信部文件发布
      max_age_days: 2

    # 新能源车企官方微信公众号
    - id: "xiaomi-auto"
      name: "小米汽车"
      url: "https://rsshub.app/wechat/mp/home/xiaomi"
      max_age_days: 2

    - id: "byd-auto"
      name: "比亚迪"
      url: "https://rsshub.app/wechat/mp/home/byd"
      max_age_days: 2

    - id: "nio"
      name: "蔚来"
      url: "https://rsshub.app/wechat/mp/home/nio"
      max_age_days: 2

    - id: "lixiang-auto"
      name: "理想汽车"
      url: "https://rsshub.app/wechat/mp/home/lixiang"
      max_age_days: 2

    - id: "xiaopeng-auto"
      name: "小鹏汽车"
      url: "https://rsshub.app/wechat/mp/home/xiaopeng"
      max_age_days: 2

    - id: "zeekr"
      name: "极氪"
      url: "https://rsshub.app/wechat/mp/home/zeekr"
      max_age_days: 2

    - id: "aito"
      name: "问界"
      url: "https://rsshub.app/wechat/mp/home/aito"
      max_age_days: 2

    - id: "leapmotor"
      name: "零跑汽车"
      url: "https://rsshub.app/wechat/mp/home/leapmotor"
      max_age_days: 2

report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 10

filter:
  method: "keyword"
  priority_sort_enabled: true

display:
  region_order:
    - hotlist
    - rss
  regions:
    new_items: false
    hotlist: true
    rss: true
    standalone: false
    ai_analysis: false

notification:
  enabled: true
  channels:
    bark:
      url: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
    json: true
  local:
    data_dir: "output"
    retention_days: 0

ai:
  model: "openai/Qwen/Qwen2.5-7B-Instruct"
  api_key: ""
  api_base: "https://api.siliconflow.cn/v1"
  timeout: 120
  temperature: 1.0
  max_tokens: 5000

ai_analysis:
  enabled: false

ai_translation:
  enabled: false

advanced:
  debug: false
  rss:
    request_interval: 8000
    timeout: 30
    use_proxy: false

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false

platforms:
  enabled: true
  sources:
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "cankaoxiaoxi"
      name: "参考消息"
    - id: "zaobao"
      name: "联合早报"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "cls-telegraph"
      name: "财联社电报"
    - id: "xueqiu"
      name: "雪球"
    - id: "ithome"
      name: "IT之家"
    - id: "36kr"
      name: "36氪"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2
  feeds:
    # 央媒及主流媒体高质量源
    - id: "cctv-xwlb"
      name: "央视新闻-新闻联播"
      url: "https://rsshub.app/cctv/xwlb"
    - id: "xinhua-yw"
      name: "新华网-要闻"
      url: "https://rsshub.app/xinhua/news"
    - id: "people-yw"
      name: "人民网-要闻"
      url: "https://rsshub.app/people/news/yw"
    - id: "thepaper-tt"
      name: "澎湃新闻-头条"
      url: "https://rsshub.app/thepaper/featured"
    - id: "jiemian-tx"
      name: "界面新闻-天下"
      url: "https://rsshub.app/jiemian/lists/82"
    # 上海新能源与商务政策专属监控源
    - id: "sh-sheitc"
      name: "上海市经信委-最新动态"
      url: "https://rsshub.app/gov/shanghai/sheitc/xwdt"
    - id: "sh-sww"
      name: "上海市商务委-新闻动态"
      url: "https://rsshub.app/gov/shanghai/sww/xwdt"
    - id: "sh-fgw-energy"
      name: "上海市发改委(新能源办)-政策文件"
      url: "https://rsshub.app/gov/shanghai/fgw/zcwj"

report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 10

filter:
  method: "keyword"
  priority_sort_enabled: true

display:
  region_order:
    - hotlist
    - rss
  regions:
    new_items: false
    hotlist: true
    rss: true
    standalone: false
    ai_analysis: false

notification:
  enabled: true
  channels:
    bark:
      url: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
    json: true
  local:
    data_dir: "output"
    retention_days: 0

ai:
  model: "openai/Qwen/Qwen2.5-7B-Instruct"
  api_key: ""
  api_base: "https://api.siliconflow.cn/v1"
  timeout: 120
  temperature: 1.0
  max_tokens: 5000

ai_analysis:
  enabled: false

ai_translation:
  enabled: false

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  crawler:
    request_interval: 2000
    use_proxy: false
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    bark: 4000
  batch_send_interval: 3

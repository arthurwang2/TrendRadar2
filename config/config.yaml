# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.2.0
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false

platforms:
  enabled: true
  sources:
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "cankaoxiaoxi"
      name: "参考消息"
    - id: "zaobao"
      name: "联合早报"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "cls-telegraph"
      name: "财联社电报"
    - id: "xueqiu"
      name: "雪球"
    - id: "ithome"
      name: "IT之家"
    - id: "36kr"
      name: "36氪"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2

  feeds:
    # ==================== 央媒 / 官媒源（最容易 503 的部分）====================
    # 说明：当前使用的是你私有的 vercel-rsshub 实例，免费配额有限，经常返回 503。
    # 推荐修复方案（按优先级）：
    # 1. 换成稳定公共 RSSHub 镜像（推荐）：
    #    - https://rsshub.rssforever.com/cctv/xwlb
    #    - https://rsshub.uneasy.win/cctv/xwlb
    #    - https://rsshub.app/cctv/xwlb （官方，但有时也慢）
    # 2. 自建 RSSHub（最稳，推荐有 VPS 的用户）
    # 3. 保留私有节点 + 下面代码已增强的重试机制（已自动对 503 重试 3 次 + 退避）
    #
    # 已同步修复：RSSFetcher 现在内置 urllib3 自动重试 + 更真实的 headers + 20s 超时
    # 即使源站偶尔 503，也会多等几秒再试，大幅降低“抓不到数据”的概率。
    # =====================================================================

    - id: "cctv-xwlb"
      name: "央视新闻-新闻联播"
      url: "https://taiwei-rsshub.vercel.app/cctv/xwlb"
      max_age_days: 2

    - id: "thepaper-tt"
      name: "澎湃新闻-头条"
      url: "https://taiwei-rsshub.vercel.app/thepaper/featured"
      max_age_days: 2
    
    # 政务与政策动态 (替换为谷歌新闻 Google News 官方 RSS，美国服务器直连，绝对免疫封杀)
    - id: "xinhua-yw"
      name: "新华网-要闻"
      url: "https://news.google.com/rss/search?q=新华网+要闻&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
      max_age_days: 2

    - id: "sh-sheitc"
      name: "上海市经信委-最新动态"
      url: "https://news.google.com/rss/search?q=上海市经信委+最新动态&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
      max_age_days: 2

    - id: "sh-sww"
      name: "上海市商务委-新闻动态"
      url: "https://news.google.com/rss/search?q=上海市商务委+新闻&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
      max_age_days: 2

    - id: "sh-fgw-energy"
      name: "上海市发改委-新能源政策"
      url: "https://news.google.com/rss/search?q=上海市发改委+新能源+政策&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
      max_age_days: 2
      
    - id: "miit-gov"
      name: "工信部-新能源公告"
      url: "https://news.google.com/rss/search?q=工信部+新能源汽车&hl=zh-CN&gl=CN&ceid=CN:zh-Hans" 
      max_age_days: 2

    # 新能源车企官方及全网核心动态 (替换为谷歌新闻，秒级更新，永不报错)
    - id: "xiaomi-auto"
      name: "小米汽车(全网动态)"
      url: "https://news.google.com/rss/search?q=小米汽车+官方&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
      max_age_days: 2

    - id: "byd-auto"
      name: "比亚迪(全网动态)"
      url: "https://news.google.com/rss/search?q=比亚迪汽车+官方&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
      max_age_days: 2

    - id: "nio"
      name: "蔚来(全网动态)"
      url: "https://news.google.com/rss/search?q=蔚来汽车+官方&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
      max_age_days: 2

    - id: "lixiang-auto"
      name: "理想汽车(全网动态)"
      url: "https://news.google.com/rss/search?q=理想汽车+官方&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
      max_age_days: 2

    - id: "xiaopeng-auto"
      name: "小鹏汽车(全网动态)"
      url: "https://news.google.com/rss/search?q=小鹏汽车+何小鹏&hl=zh-CN&gl=CN&ceid=CN:zh-Hans" 
      max_age_days: 2

    - id: "zeekr"
      name: "极氪(全网动态)"
      url: "https://news.google.com/rss/search?q=极氪汽车+官方&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
      max_age_days: 2

    - id: "aito"
      name: "问界AITO(全网动态)"
      url: "https://news.google.com/rss/search?q=问界+AITO汽车&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
      max_age_days: 2

    - id: "leapmotor"
      name: "零跑汽车(全网动态)"
      url: "https://news.google.com/rss/search?q=零跑汽车+官方&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
      max_age_days: 2

report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 10

filter:
  method: "ai"
  priority_sort_enabled: true

ai_filter:
  enabled: true
  batch_size: 200
  batch_interval: 5

display:
  region_order:
    - hotlist
    - rss
    - ai_analysis
  regions:
    new_items: false
    hotlist: true
    rss: true
    standalone: false
    ai_analysis: true

notification:
  enabled: true
  channels:
    bark:
      url: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
    json: true
  local:
    data_dir: "output"
    retention_days: 0

ai:
  model: "openai/Qwen/Qwen2.5-7B-Instruct"
  # api_key 留空时自动读取：环境变量 AI_API_KEY > config/secrets.yaml > 此处
  api_key: ""
  api_base: "https://api.siliconflow.cn/v1"
  timeout: 120
  temperature: 0.7
  max_tokens: 5000

ai_analysis:
  enabled: true
  max_news_for_analysis: 80
  include_rss: true
  include_rank_timeline: false

ai_translation:
  enabled: false

# ==================== V3 严格分类（用户自定义） ====================
# 用于每天对自有 daily-json（TrendRadar2/report/daily-json/）做精确筛选
# 生成 Guizang 风格竞品整车 + 新能源/AI非整车赛道简报
strict_v3:
  enabled: true                  # 总开关
  use_for_rss_feeds:             # 仅对这些 feed_id 启用严格分类（留空则对所有 RSS 尝试）
    - "xiaomi-auto"
    - "byd-auto"
    - "nio"
    - "lixiang-auto"
    - "xiaopeng-auto"
    - "zeekr"
    - "miit-gov"                 # 工信部源经常需要严格过滤
  max_candidates_per_day: 200    # 两日+硬块过滤后最多送给 AI 的候选数（保护 token）
  debug: false

advanced:
  debug: false
  rss:
    request_interval: 15000
    timeout: 60
    use_proxy: false

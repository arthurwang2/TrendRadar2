app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false

platforms:
  enabled: true
  sources:
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "cankaoxiaoxi"
      name: "参考消息"
    - id: "zaobao"
      name: "联合早报"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "cls-telegraph"
      name: "财联社电报"
    - id: "xueqiu"
      name: "雪球"
    - id: "ithome"
      name: "IT之家"
    - id: "36kr"
      name: "36氪"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2
  feeds:
    # 填入你指定的高质量官方源
    - id: "people-daily"
      name: "人民日报"
      url: "http://rss.people.com.cn/rss/people.xml"
    - id: "people-domestic"
      name: "人民网-国内新闻"
      url: "http://www.people.com.cn/rss/GB/59476/1.xml"
    - id: "xinhua-yw"
      name: "新华网-要闻"
      url: "http://www.xinhuanet.com/rss/news.xml"
    - id: "cctv-yw"
      name: "央视新闻-要闻"
      url: "https://news.cctv.com/rss/1_1.xml"
    - id: "xinhua-world"
      name: "新华网-国际新闻"
      url: "http://www.xinhuanet.com/rss/world.xml"
    - id: "people-politics"
      name: "人民网-时政"
      url: "http://www.people.com.cn/rss/GB/59476/2.xml"

report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 10 # 既然是做本地分析的数据源，放宽抓取数量

filter:
  method: "keyword"
  priority_sort_enabled: true

display:
  region_order:
    - hotlist
    - rss
  regions:
    new_items: false
    hotlist: true
    rss: true
    standalone: false
    ai_analysis: false      # 彻底关闭网页端的 AI 分析模块

notification:
  enabled: true
  channels:
    bark:
      url: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
    json: true              # 必须开启：生成 JSON 文件供你本地分析
  local:
    data_dir: "output"
    retention_days: 0

ai:
  model: "openai/Qwen/Qwen2.5-7B-Instruct"
  api_key: ""
  api_base: "https://api.siliconflow.cn/v1"
  timeout: 120
  temperature: 1.0
  max_tokens: 5000

ai_analysis:
  enabled: false            # 彻底关闭系统自带的 AI 请求

ai_translation:
  enabled: false            # 彻底关闭翻译

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  crawler:
    request_interval: 2000
    use_proxy: false
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    bark: 4000
  batch_send_interval: 3

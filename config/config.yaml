app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false

platforms:
  enabled: true
  sources:
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "cankaoxiaoxi"
      name: "参考消息"
    - id: "zaobao"
      name: "联合早报"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "cls-telegraph"
      name: "财联社电报"
    - id: "xueqiu"
      name: "雪球"
    - id: "ithome"
      name: "IT之家"
    - id: "36kr"
      name: "36氪"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1

  feeds:
    # 央媒及政务高质量源 (分摊给服务器 A, B, C)
    - id: "cctv-xwlb"
      name: "央视新闻-新闻联播"
      url: "https://rsshub.rssforever.com/cctv/xwlb"
      max_age_days: 1

    - id: "xinhua-yw"
      name: "新华网-要闻"
      url: "https://rss.shab.fun/xinhua/news"
      max_age_days: 1

    - id: "thepaper-tt"
      name: "澎湃新闻-头条"
      url: "https://rsshub.top/thepaper/featured"
      max_age_days: 1
    
    - id: "sh-sheitc"
      name: "上海市经信委-最新动态"
      url: "https://rss.shab.fun/gov/shanghai/sheitc/xwdt"
      max_age_days: 1

    - id: "sh-sww"
      name: "上海市商务委-新闻动态"
      url: "https://rsshub.top/gov/shanghai/sww/xwdt"
      max_age_days: 1

    - id: "sh-fgw-energy"
      name: "上海市发改委(新能源办)-政策文件"
      url: "https://rsshub.rssforever.com/gov/shanghai/fgw/zcwj"
      max_age_days: 1
      
    - id: "miit-gov"
      name: "工信部官网"
      url: "https://rsshub.top/gov/miit/wjfb" 
      max_age_days: 2

    # 新能源车企官方动态 (已全部替换为官方微博源，100%稳定不拦截)
    - id: "xiaomi-auto"
      name: "小米汽车(官方)"
      url: "https://rsshub.rssforever.com/weibo/user/7871239944"
      max_age_days: 1

    - id: "byd-auto"
      name: "比亚迪(官方)"
      url: "https://rss.shab.fun/weibo/user/2729215972"
      max_age_days: 1

    - id: "nio"
      name: "蔚来(官方)"
      url: "https://rsshub.top/weibo/user/6463388040"
      max_age_days: 1

    - id: "lixiang-auto"
      name: "理想汽车(官方)"
      url: "https://rsshub.rssforever.com/weibo/user/6001272153"
      max_age_days: 1

    - id: "xiaopeng-auto"
      name: "小鹏汽车(何小鹏)"
      url: "https://rss.shab.fun/weibo/user/2455476364" # 采用何小鹏本人微博，爆料最快最准
      max_age_days: 1

    - id: "zeekr"
      name: "极氪(官方)"
      url: "https://rsshub.top/weibo/user/7576049404"
      max_age_days: 1

    - id: "aito"
      name: "问界AITO(官方)"
      url: "https://rsshub.rssforever.com/weibo/user/7711487956"
      max_age_days: 1

    - id: "leapmotor"
      name: "零跑汽车(官方)"
      url: "https://rss.shab.fun/weibo/user/5872290888"
      max_age_days: 1

report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 10

filter:
  method: "keyword"
  priority_sort_enabled: true

display:
  region_order:
    - hotlist
    - rss
  regions:
    new_items: false
    hotlist: true
    rss: true
    standalone: false
    ai_analysis: false

notification:
  enabled: true
  channels:
    bark:
      url: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
    json: true
  local:
    data_dir: "output"
    retention_days: 0

ai:
  model: "openai/Qwen/Qwen2.5-7B-Instruct"
  api_key: ""
  api_base: "https://api.siliconflow.cn/v1"
  timeout: 120
  temperature: 1.0
  max_tokens: 5000

ai_analysis:
  enabled: false

ai_translation:
  enabled: false

advanced:
  debug: false
  rss:
    request_interval: 15000
    timeout: 60
    use_proxy: false

name: Get Hot News

on:
  schedule:
    - cron: "0 */12 * * *"   # 每天 00:00 和 12:00（上海时间），每半天一次
  workflow_dispatch:

concurrency:
  group: crawler-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Verify required files
        run: |
          if [ ! -f config/config.yaml ]; then
            echo "Error: Config missing"
            exit 1
          fi

      - name: Run crawler
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          BARK_URL: ${{ secrets.BARK_URL }}
          BARK_PUSH: ${{ secrets.BARK_PUSH }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
          GENERIC_WEBHOOK_TEMPLATE: ${{ secrets.GENERIC_WEBHOOK_TEMPLATE }}
          AI_ANALYSIS_ENABLED: "false"
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
          GITHUB_ACTIONS: true
        run: uv run python -m trendradar

      - name: Convert DB to JSON with Full Content
        run: |
          python3 <<EOF
          import os, sqlite3, json
          from datetime import datetime, timezone, timedelta

          def extract_table(db_path, table_name):
              if not os.path.exists(db_path): return []
              try:
                  conn = sqlite3.connect(db_path)
                  cur = conn.cursor()
                  cur.execute(f"SELECT name FROM sqlite_master WHERE type='table' AND name='{table_name}'")
                  if not cur.fetchone():
                      conn.close()
                      return []
                  
                  cur.execute(f"SELECT * FROM {table_name}")
                  cols = [d[0] for d in cur.description]
                  rows = cur.fetchall()
                  conn.close()
                  
                  items = []
                  for r in rows:
                      item = dict(zip(cols, r))
                      if not item.get('title') or not item.get('url'):
                          continue
                      
                      content = item.get('content', '')
                      if not content or len(content) < 50:
                          content = item.get('description', '')
                      
                      item['full_content'] = content
                      items.append(item)
                  return items
              except Exception as e:
                  print(f"Error processing {db_path}: {e}")
                  return []

          output_dir = "output"
          news_dir = os.path.join(output_dir, "news")
          rss_dir = os.path.join(output_dir, "rss")
          all_items = []

          if os.path.exists(news_dir):
              for f in os.listdir(news_dir):
                  if f.endswith(".db"):
                      all_items.extend(extract_table(os.path.join(news_dir, f), "news_items"))

          if os.path.exists(rss_dir):
              for f in os.listdir(rss_dir):
                  if f.endswith(".db"):
                      all_items.extend(extract_table(os.path.join(rss_dir, f), "rss_items"))

          # 获取上海时间 (UTC+8) 的当前日期
          tz_sh = timezone(timedelta(hours=8))
          today_str = datetime.now(tz_sh).strftime('%Y-%m-%d')
          print(f"Filtering data for today: {today_str}")

          filtered_items = []
          for item in all_items:
              item_time = str(item.get('created_at', item.get('updated_at', '')))
              if today_str in item_time:
                  filtered_items.append(item)

          filtered_items.sort(key=lambda x: x.get('created_at', ''), reverse=True)

          json_path = os.path.join(output_dir, "trendradar_full_content.json")
          with open(json_path, 'w', encoding='utf-8') as f:
              json.dump(filtered_items, f, ensure_ascii=False, indent=4)
          
          print(f"SUCCESS: Exported {len(filtered_items)} items for today.")
          EOF

      - name: Upload Output Data (JSON for local use)
        uses: actions/upload-artifact@v4
        with:
          name: TrendRadar-JSON-Data
          path: output/
          retention-days: 7

      - name: Deploy HTML report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/html
          destination_dir: report
          keep_files: true
          force_orphan: false
